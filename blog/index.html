<!DOCTYPE html>
<html lang="zh">
<head>
    <title>Blog</title>
    <meta charset="utf-8">
</head>
<body>
    <script src="/js/jquery.min.js"></script>
    <script src="/js/build.js"></script>
    <script src="/blog/blog.js"></script>

    <div id="container">
        <div id="main">
            <div id="left"></div>
            <div id="right">
                <div class="card">
                    <form id="show" style="text-align: center; line-height: 2.5em;">
                        Sort By: <select id="sort">
                            <option value="title">title</option>
                            <option value="created" selected>created</option>
                            <option value="last-modified">last modified</option>
                        </select><br />
                        Order: <select id="order">
                            <option value="0">ascend ↑</option>
                            <option value="1" selected>descend ↓</option>
                        </select>
                    </form>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
