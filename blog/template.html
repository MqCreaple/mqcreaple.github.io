<div class="card blog" onclick="window.open('./{% id %}')">

    <div class="inline">
        <p><i class="fas fa-calendar-alt"></i>{% created %}</p>

        <p><i class="fas fa-tag"></i>{% tag %}</p>
    </div>
</div>
