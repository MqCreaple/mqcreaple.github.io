<!DOCTYPE html>
<html>
    <head>
        <title>404 Not Found!</title>
        <meta charset="utf-8">
        <link rel="stylesheet" href="/css/main.css">
        <link rel="stylesheet" href="/css/font-awesome.min.css">
    </head>
    <body>
        <div style="display: flex; justify-content: center;color: #efefef;">
            <div style="margin: 0; width: 40%;">
                <div style="float: right; display: flex; flex-direction: column;">
                    <p style="font-size: 8em; margin-bottom: 15%; margin-top: 45%;"><i class="fas fa-exclamation-triangle"></i></p>
                    <p style="font-size: 2em; font-family: Consolas;">ERROR :(&nbsp;</p>
                </div>
            </div>
            <div style="margin: 0; width: 60%;">
                <div style="float: left;">
                    <p style="font-size: 4em">404 NOT FOUND!</p>
                    <p style="font-size: 1.5em;">The requested URL /404 was not found on this server.</p>
                    <button style="font-size: 2em; border: 2px double #efefef; padding: 2%;"
                            onmouseover="style.color='#efefef'; style.backgroundColor='#000000'"
                            onclick="location.replace('/');">
                        <i class="fas fa-home"></i>back to mainpage
                    </button>
                </div>
            </div>
        </div>
    </body>
</html>
