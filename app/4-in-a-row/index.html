<!DOCTYPE html>
<html lang="zh">
<head>
    <title>Four in a Row</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="4-in-a-row.css">
</head>
<body>
    <script src="/js/jquery.min.js"></script>
    <script src="/js/build.js"></script>
    <script src="data.js"></script>
    <script src="4-in-a-row.js"></script>

    <div id="container">
        <div id="main">
            <div id="left">
                <div class="card" id="article">
                    <div id="chessboard"></div>
                </div>
                <div class="card gamerule">
                    <h2>Game Rules</h2>
                    <p>The chess board is a 4×4×4 cube. One player is X and the other is O.</p>
                    <p>The first player who get four pieces in a row (row in 3D space of course) will win.</p>
                </div>
            </div>
            <div id="right"></div>
        </div>
    </div>
</body>
</html>
