<!DOCTYPE html>
<html lang="zh">
<head>
    <title>Four in a Row</title>
    <meta charset="utf-8">
    <link rel="stylesheet" href="4-in-a-row.css">
</head>
<body>
    <script src="/js/jquery.min.js"></script>
    <script src="/js/build.js"></script>
    <script src="data.js"></script>
    <script src="4-in-a-row.js"></script>

    <div id="container">
        <div id="main">
            <div id="left">
                <div class="card" id="article">
                    <div id="chessboard"></div>
                </div>
                <div class="card gamerule">
                    <h2>Game Rules</h2>
                    <p>The chess board is a 4×4×4 cube. One player is X and the other is O.</p>
                    <p>The first player who get four pieces in a row (row in 3D space of course) will win.</p>
                </div>
            </div>
            <div id="right">
                <div class="card control">
                    <div id="players">
                        <div class="player" id="player1">
                            <p>Player 1</p>
                            <p><i class="fa fa-times"></i></p>
                        </div>
                        <div class="player" id="player2">
                            <p>Player 2</p>
                            <p><i class="fa fa-circle-o"></i></p>
                        </div>
                    </div>
                    <button class="control" onclick="withdraw()">
                        <i class="fa fa-arrow-left"></i> withdraw
                    </button>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
